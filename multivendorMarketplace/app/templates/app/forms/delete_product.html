{% extends 'app/base.html' %}

{% block content %}
<div class="max-w-lg mx-auto mt-10 bg-white shadow-md rounded p-6">
    <h2 class="text-2xl font-bold mb-4">Delete Product</h2>

    {% if product.file %}
            <img src="{{ product.file.url }}"
                 alt="{{ product.name }}"
                 class="w-full h-64 object-cover rounded mb-4">
    {% endif %}


    <p class="text-lg font-semibold mb-2">{{ product.name }}</p>
    <p class="text-gray-700 mb-2">{{ product.description }}</p>
    <p class="text-green-600 font-bold mb-6">₹{{ product.price }}</p>

    <p class="mb-6">
        Are you sure you want to delete <strong>{{ product.name }}</strong>?
    </p>

    <form method="post" action="{% url 'delete_product' product.id %}">
        {% csrf_token %}
        <div class="flex justify-between">
            <button type="submit" class="bg-red-600 text-white px-4 py-2 rounded hover:bg-red-700">
                Yes, Delete
            </button>
            <a href="{% url 'index' %}" class="bg-gray-300 text-black px-4 py-2 rounded hover:bg-gray-400">
                Cancel
            </a>
        </div>
    </form>
</div>
{% endblock %}
