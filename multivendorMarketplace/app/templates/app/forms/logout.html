{% extends 'app/base.html' %}

{% block content %}
<div class="flex items-center justify-center min-h-screen bg-gray-100">
    <div class="w-full max-w-md bg-white shadow-lg rounded-lg p-8 text-center">
        <h2 class="text-2xl font-bold mb-4">You have been logged out</h2>
        <p class="text-gray-600 mb-6">
            Thank you for visiting. You can log in again anytime.
        </p>
        <a href="{% url 'login' %}"
           class="inline-block bg-blue-600 text-white py-2 px-4 rounded hover:bg-blue-700 transition">
            Login Again
        </a>
    </div>
</div>
{% endblock %}
